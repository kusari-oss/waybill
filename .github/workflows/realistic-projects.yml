name: Realistic projects

# Milestone 054 FR-006/FR-007/FR-010: regression-prevention CI
# job that scans real-world OSS projects (clone-at-fixed-tag) to
# catch the next class of "fairly basic issues" before merge.
#
# Separate workflow file (not folded into ci.yml) per FR-010 —
# flake isolation. Network-dependent clone + per-platform
# multipliers shouldn't couple to the main pre-PR gate's
# flakiness budget. Re-runnable in isolation via
# `gh run rerun --failed`.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: realistic-projects-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  scan-realistic-project:
    name: Scan ${{ matrix.project.name }} on ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        project:
          # Initial milestone-054 entry: knative/func is the user's
          # original repro for issue #102 (multi-module Go layout +
          # 10+ intentional symlink-loop test fixtures in
          # `pkg/oci/testdata/test-links/`). Per-ecosystem expansion
          # to cargo/npm/maven/pip/gem/dpkg/apk/rpm tracked in #109.
          - name: knative-func
            url: https://github.com/knative/func.git
            tag: knative-v1.22.0
            expected_min_components: 200
            # Milestone 055 SC-003: realistic-project gate for the
            # Go transitive-edge resolver. The second scan step
            # (run WITHOUT `--offline` so steps 1+3 of the ladder
            # can supply edges) produces the CDX from which we
            # count `pkg:golang` → `pkg:golang` dependsOn edges.
            # Baseline + measurement notes:
            # `specs/055-go-transitive-edges/realistic-project-baseline.md`.
            #
            # Milestone 059 (graph topology fix per #113 reviewer
            # feedback): main-module now emits ONLY non-`// indirect`
            # requires as direct edges, so the previous 200 floor
            # measured against the pre-059 over-eager edge count is
            # no longer accurate. Lowered conservatively to 100;
            # first green CI run on this baseline records the actual
            # measured value in realistic-project-baseline.md and
            # the floor can be tightened later.
            expected_min_pkg_golang_edges: 100
          # Issue #109 expansion — top-3 most-common ecosystems
          # beyond Go. Fixtures chosen for: small enough to keep CI
          # wall-clock bounded; canonical upstreams developers
          # recognize; stable per-tag dep graphs so floors don't
          # flake on minor upstream churn.
          #
          # Component floors are set conservatively (well under
          # the actual emit count at the pinned tag) so a
          # one-version upstream bump won't false-positive — they
          # catch a regression that drops a whole reader's
          # output (the original #109 concern), not a single-dep
          # delta.
          # Floors calibrated against measured ubuntu-latest output
          # from this PR's first CI run (express=60, flask=141,
          # ripgrep=82). Each floor is set well below the measured
          # value to absorb minor upstream churn without false-
          # positives, while still catching a regression that drops
          # a whole reader's output (#109's original concern).
          - name: express
            url: https://github.com/expressjs/express.git
            tag: v5.2.1
            expected_min_components: 30
          - name: flask
            url: https://github.com/pallets/flask.git
            tag: 3.1.3
            expected_min_components: 50
          - name: ripgrep
            url: https://github.com/BurntSushi/ripgrep.git
            tag: 14.1.1
            expected_min_components: 40
          # Issue #109 — continued expansion: maven + gem. Floors
          # start conservatively low (3-5) so the first CI run
          # surfaces the empirical count without false-positives;
          # a follow-up PR tightens them per the express/flask/
          # ripgrep calibration pattern.
          - name: jackson-databind
            url: https://github.com/FasterXML/jackson-databind.git
            tag: jackson-databind-3.1.4
            expected_min_components: 5
          - name: sinatra
            url: https://github.com/sinatra/sinatra.git
            tag: v4.2.1
            expected_min_components: 3
        platform:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # see ci.yml for rationale

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-25)

      - name: Cache cargo + build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          # Bumped 2026-05-15 to invalidate snapshots that captured a
          # `~/.cargo/bin/cargo` which is itself broken (renamed/linked
          # to rustup-init by an earlier dtolnay run). The fresh cache
          # is built post-cleanup so the snapshot is always clean.
          prefix-key: v1-rust

      # See ci.yml::lint-and-test for the rationale. This realistic-
      # projects workflow is where the flake surfaced on PR #214.
      # MUST run AFTER Swatinem/rust-cache or its $CARGO_HOME/bin
      # restore re-creates rustup-init.
      - name: Remove rustup-init + verify cargo works (`cargo +stable` dispatch race)
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init" "$HOME/.cargo/bin/rustup-init.exe"
          # Sanity-check: cargo must actually dispatch as cargo, not
          # as rustup-init. The plain `rm` isn't enough if a cached
          # `~/.cargo/bin/cargo` is itself the rustup-init binary
          # (different file name, same broken installer body) —
          # observed on PR #217 realistic-projects macOS lane.
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: \`cargo --version\` fails — \$HOME/.cargo/bin/cargo is not a working cargo proxy."
            echo "--- ls -la \$HOME/.cargo/bin/ ---"
            ls -la "$HOME/.cargo/bin/" || true
            echo "--- file \$HOME/.cargo/bin/cargo ---"
            file "$HOME/.cargo/bin/cargo" || true
            echo "--- cargo --version output ---"
            cargo --version 2>&1 || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"
          if [ -e "$HOME/.cargo/bin/rustup-init" ] || [ -e "$HOME/.cargo/bin/rustup-init.exe" ]; then
            echo "ERROR: rustup-init still present after rm."
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "rustup-init absent from \$HOME/.cargo/bin (good)."

      # Per FR-007: live `git clone --depth 1 --branch <tag>` per CI run,
      # cached by <project>:<tag>. Cache hit → skip clone; cache miss →
      # clone fresh. Live network failure on github.com → CI rerun
      # fixes; we do NOT silently skip the fixture (would mask
      # regressions per FR-007).
      - name: Cache realistic-project fixture
        id: cache-fixture
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/realistic-fixtures/${{ matrix.project.name }}-${{ matrix.project.tag }}
          key: realistic-fixture-${{ matrix.project.name }}-${{ matrix.project.tag }}-v1

      - name: Clone ${{ matrix.project.name }} @ ${{ matrix.project.tag }}
        if: steps.cache-fixture.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/realistic-fixtures
          git clone --depth 1 --branch "${{ matrix.project.tag }}" \
            "${{ matrix.project.url }}" \
            "/tmp/realistic-fixtures/${{ matrix.project.name }}-${{ matrix.project.tag }}"

      - name: Build waybill
        run: cargo +stable build -p waybill

      - name: Scan ${{ matrix.project.name }}
        run: |
          # `set -o pipefail` so the step exits non-zero when waybill
          # fails — the trailing `tee` would otherwise mask the
          # waybill exit code.
          set -o pipefail
          # Isolate HOME + GOMODCACHE so the scan doesn't pick up
          # the runner's own Go module cache; mirrors the milestone
          # 053 pattern + the user's original issue-#102 reproducer.
          # Job-level `timeout-minutes: 15` provides the wall-clock
          # bound (no `timeout` shell binary needed; macOS doesn't
          # ship GNU coreutils' `timeout`).
          HOME=$(mktemp -d) GOMODCACHE=$(mktemp -d)/empty \
            ./target/debug/waybill --offline sbom scan \
              --path "/tmp/realistic-fixtures/${{ matrix.project.name }}-${{ matrix.project.tag }}" \
              --format spdx-2.3-json,cyclonedx-json \
              --output spdx-2.3-json=/tmp/${{ matrix.project.name }}.spdx.json \
              --output cyclonedx-json=/tmp/${{ matrix.project.name }}.cdx.json \
              --no-deep-hash 2>&1 | tee /tmp/scan.log

      # Milestone 055 SC-003: second scan WITHOUT `--offline` to
      # exercise the Go transitive-edge resolver's online path
      # (steps 1+3 of the ladder per FR-002). The main-module + cache-walk
      # behavior is already verified by the first scan above; this
      # second scan is specifically for the post-053 transitive
      # edge-count gate. Skipped when the matrix entry doesn't pin
      # an `expected_min_pkg_golang_edges` value.
      - name: Scan ${{ matrix.project.name }} (online — for transitive-edge gate)
        if: matrix.project.expected_min_pkg_golang_edges
        run: |
          set -o pipefail
          # NB: no `--offline`, no GOMODCACHE override — let the
          # resolver's step 1 (`go mod graph`) and step 3 (proxy
          # fetch) work normally. Runners have `go` pre-installed
          # so step 1 covers most modules; step 3 fills any gaps.
          #
          # alpha.14: skip ClearlyDefined + deps.dev-graph enrichment
          # via the milestone-#136 flags. This step's purpose is
          # exclusively the Go transitive-edge resolver gate (SC-003) —
          # neither CD nor deps.dev-graph contributes to Go transitive
          # edges (the resolver uses `go mod graph` + GOMODCACHE walk +
          # GOPROXY fetch). When CD's API has a slow event (knative-func
          # has 1000+ components and CD is ~87% of online wall-clock per
          # #137), this lane hits the 15-minute job timeout. Skipping
          # them keeps the assertion focused and the job under budget.
          ./target/debug/waybill sbom scan \
            --path "/tmp/realistic-fixtures/${{ matrix.project.name }}-${{ matrix.project.tag }}" \
            --format cyclonedx-json \
            --output cyclonedx-json=/tmp/${{ matrix.project.name }}.online.cdx.json \
            --no-clearly-defined \
            --no-deps-dev-graph \
            --no-deep-hash 2>&1 | tee /tmp/scan.online.log

      - name: Validate Go transitive-edge count (SC-003)
        if: matrix.project.expected_min_pkg_golang_edges
        run: |
          # Count CDX `dependencies[].dependsOn` edges where BOTH the
          # parent ref AND every emitted target start with `pkg:golang/`.
          # Mirrors milestone 055 SC-006 ("every edge target in SBOM")
          # — by counting only edges whose target is also a Go PURL,
          # we exercise the resolver's intersection-with-go.sum
          # discipline (FR-003).
          GO_EDGE_COUNT=$(jq '
            [
              .dependencies[]
              | select(.ref | startswith("pkg:golang/"))
              | (.dependsOn // [])[]
              | select(startswith("pkg:golang/"))
            ] | length
          ' /tmp/${{ matrix.project.name }}.online.cdx.json)
          MIN_EDGES=${{ matrix.project.expected_min_pkg_golang_edges }}
          echo "pkg:golang transitive edges: $GO_EDGE_COUNT (floor $MIN_EDGES)"
          if [ "$GO_EDGE_COUNT" -lt "$MIN_EDGES" ]; then
            echo "::error::Go transitive edges regressed: ${{ matrix.project.name }} produced $GO_EDGE_COUNT edges (expected >= $MIN_EDGES per milestone 055 SC-003). See specs/055-go-transitive-edges/realistic-project-baseline.md for measurement context."
            exit 1
          fi
          echo "## SC-003: pkg:golang transitive edges" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ matrix.project.name }} on ${{ matrix.platform }}: **$GO_EDGE_COUNT** edges (floor $MIN_EDGES)" >> "$GITHUB_STEP_SUMMARY"

      - name: Validate SBOM structure + component floor
        run: |
          # Ensure jq is available (it is on ubuntu-latest + macos-latest by default).
          # Component-floor check: realistic-project SBOMs MUST emit
          # at least N pkg:<ecosystem>/ components per matrix entry.
          # Catches regressions that quietly drop large swaths of
          # output without crashing.
          SPDX_PKG_COUNT=$(jq '.packages | length' /tmp/${{ matrix.project.name }}.spdx.json)
          CDX_COMP_COUNT=$(jq '.components | length' /tmp/${{ matrix.project.name }}.cdx.json)
          echo "SPDX 2.3 packages: $SPDX_PKG_COUNT"
          echo "CDX 1.6 components: $CDX_COMP_COUNT"
          if [ "$SPDX_PKG_COUNT" -lt "${{ matrix.project.expected_min_components }}" ]; then
            echo "::error::SPDX 2.3 component floor missed: got $SPDX_PKG_COUNT, expected >= ${{ matrix.project.expected_min_components }}"
            exit 1
          fi
          # Loose CDX floor — CDX excludes the main-module from
          # components[] per milestone 053 FR-001a, so its count is
          # 1 lower than SPDX's. Pin floor at expected - 5 for
          # safety vs. component-counting nits.
          MIN_CDX=$(( ${{ matrix.project.expected_min_components }} - 5 ))
          if [ "$CDX_COMP_COUNT" -lt "$MIN_CDX" ]; then
            echo "::error::CDX 1.6 component floor missed: got $CDX_COMP_COUNT, expected >= $MIN_CDX"
            exit 1
          fi
          # Each emitted SBOM must validate as JSON (basic structural
          # gate — full schema validation against SPDX 3 schema is
          # exercised separately in `tests/spdx3_schema_validation.rs`
          # against in-tree fixtures; the realistic-project lane gets
          # the cheaper structural check to keep wall-clock bounded).
          jq -e 'has("spdxVersion") and has("packages") and has("relationships")' \
            /tmp/${{ matrix.project.name }}.spdx.json > /dev/null
          jq -e 'has("bomFormat") and has("components") and has("metadata")' \
            /tmp/${{ matrix.project.name }}.cdx.json > /dev/null

      - name: Report scan duration in summary
        if: always()
        run: |
          # Already captured the exit code in the scan step; this
          # block adds a job-summary line so reviewers see the
          # per-project duration without scrolling logs.
          echo "## ${{ matrix.project.name }} on ${{ matrix.platform }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/scan.log ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -3 /tmp/scan.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  # Issue #109 — OS-package readers (dpkg / apk / rpm) need rootfs
  # fixtures from real container images. Split from `scan-realistic-
  # project` because:
  #
  # 1. macos-latest GitHub Actions runners don't ship docker (the
  #    `scan-realistic-project` matrix runs on both platforms), so a
  #    matrix-merged approach would need every step gated on
  #    `if: matrix.platform == 'ubuntu-latest'` and the macOS combos
  #    would produce noisy empty jobs.
  # 2. Setup shape differs — `docker pull` + `docker save` instead of
  #    `git clone`. Keeps the two job's step lists clean and self-
  #    contained.
  #
  # The dpkg / apk / rpm production readers are themselves `#[cfg(unix)]`
  # gated (per #210 close-out) so Linux-only CI coverage matches the
  # production code's platform scope.
  scan-rootfs-image:
    name: Scan ${{ matrix.image.name }} rootfs (ubuntu)
    strategy:
      fail-fast: false
      matrix:
        image:
          # Floors start conservatively low; the first CI run reveals
          # the empirical count and a follow-up tightens (same pattern
          # as #411 calibrated express/flask/ripgrep).
          - name: debian-rootfs
            tag: debian:12-slim
            expected_min_components: 10
          - name: alpine-rootfs
            tag: alpine:3.19
            expected_min_components: 5
          - name: rockylinux-rootfs
            tag: rockylinux:9
            expected_min_components: 50
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-25)

      - name: Cache cargo + build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          prefix-key: v1-rust-rootfs

      # See ci.yml::lint-and-test rationale. Same rustup-init race
      # the `scan-realistic-project` job guards against.
      - name: Remove rustup-init + verify cargo works
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init"
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: cargo --version fails"
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"

      # Cache the saved tarball keyed on the image tag — the docker
      # image content is identity-stable per tag for the lifetime of
      # the tag, so cache hits skip both `docker pull` AND `docker
      # save` (the slower of the two on cold runners).
      - name: Cache rootfs tarball
        id: cache-tarball
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/${{ matrix.image.name }}.tar
          key: rootfs-tarball-${{ matrix.image.name }}-${{ matrix.image.tag }}-v1

      - name: Pull + save ${{ matrix.image.tag }}
        if: steps.cache-tarball.outputs.cache-hit != 'true'
        run: |
          docker pull "${{ matrix.image.tag }}"
          docker save "${{ matrix.image.tag }}" -o /tmp/${{ matrix.image.name }}.tar
          ls -lh /tmp/${{ matrix.image.name }}.tar

      - name: Build waybill
        run: cargo +stable build -p waybill

      - name: Scan ${{ matrix.image.name }}
        run: |
          set -o pipefail
          # waybill auto-detects the `--image` argument as a tarball
          # path (vs an OCI ref) when the value is an existing file
          # on disk. No `--image-src` needed for the archive path.
          # Isolate HOME so the scan doesn't pick up the runner's
          # own caches.
          HOME=$(mktemp -d) \
            ./target/debug/waybill --offline sbom scan \
              --image /tmp/${{ matrix.image.name }}.tar \
              --format spdx-2.3-json,cyclonedx-json \
              --output spdx-2.3-json=/tmp/${{ matrix.image.name }}.spdx.json \
              --output cyclonedx-json=/tmp/${{ matrix.image.name }}.cdx.json \
              --no-deep-hash 2>&1 | tee /tmp/scan.log

      - name: Validate SBOM structure + component floor
        run: |
          SPDX_PKG_COUNT=$(jq '.packages | length' /tmp/${{ matrix.image.name }}.spdx.json)
          CDX_COMP_COUNT=$(jq '.components | length' /tmp/${{ matrix.image.name }}.cdx.json)
          echo "SPDX 2.3 packages: $SPDX_PKG_COUNT"
          echo "CDX 1.6 components: $CDX_COMP_COUNT"
          if [ "$SPDX_PKG_COUNT" -lt "${{ matrix.image.expected_min_components }}" ]; then
            echo "::error::SPDX 2.3 component floor missed: got $SPDX_PKG_COUNT, expected >= ${{ matrix.image.expected_min_components }}"
            exit 1
          fi
          MIN_CDX=$(( ${{ matrix.image.expected_min_components }} - 5 ))
          if [ "$CDX_COMP_COUNT" -lt "$MIN_CDX" ]; then
            echo "::error::CDX 1.6 component floor missed: got $CDX_COMP_COUNT, expected >= $MIN_CDX"
            exit 1
          fi
          jq -e 'has("spdxVersion") and has("packages") and has("relationships")' \
            /tmp/${{ matrix.image.name }}.spdx.json > /dev/null
          jq -e 'has("bomFormat") and has("components") and has("metadata")' \
            /tmp/${{ matrix.image.name }}.cdx.json > /dev/null

      - name: Report scan summary
        if: always()
        run: |
          echo "## ${{ matrix.image.name }} (${{ matrix.image.tag }})" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/scan.log ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -3 /tmp/scan.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
