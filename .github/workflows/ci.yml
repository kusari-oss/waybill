name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Third-party GitHub Actions are pinned to full commit SHAs (with
  # the human-readable tag in a trailing comment) so a hijacked or
  # silently-updated mutable tag can't inject malicious code into our
  # CI without showing up as a SHA change in a future PR. Surfaced by
  # Kusari Inspector's supply-chain mitigation check on milestone-016
  # PR #34. To upgrade: bump the SHA + comment together; verify the
  # comment matches what `gh api /repos/<owner>/<repo>/git/ref/tags/<tag>`
  # returns (or the dereferenced commit for annotated tags).
  #
  # CI matrix (post-milestone-020):
  #   - lint-and-test           (Linux, default features, stable only)
  #   - lint-and-test-macos     (macOS, default features, stable only)
  #   - lint-and-test-ebpf      (Linux, --features ebpf-tracing, stable + nightly + bpf-linker)
  #
  # The default lanes drop the nightly + bpf-linker + xtask ebpf cost
  # entirely. The ebpf lane runs in parallel and is the regression gate
  # for the user-space eBPF integration. See
  # specs/020-ebpf-feature-gate/ for the full rationale.
  lint-and-test:
    name: Lint + test (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Don't write the auto-provisioned GITHUB_TOKEN into the
          # checked-out repo's `.git/config`. The CI flow doesn't push
          # back to GitHub, so the token isn't needed post-checkout;
          # leaving it out closes a potential leakage path if a
          # future step ever ends up uploading the working directory
          # as an artifact. Best-practice per OWASP CI/CD top-10
          # CICD-SEC-1 + Kusari Inspector hardening guidance.
          persist-credentials: false

      # Milestone 115 — walker-audit allow-list gate (closes #342).
      # Codifies the milestone-114 `safe_walk` no-hand-rolled-walker
      # invariant as a CI check. The audit grep enumerates every
      # `fn walk[_(]` match under `mikebom-cli/src/scan_fs/`; the
      # committed allow-list at `mikebom-cli/src/scan_fs/walk.audit-allowlist.txt`
      # is the single source of truth for "intentional matches."
      # Drift in either direction (new walker without intent, or
      # stale exception left behind) fails the build.
      #
      # Slotted before `Install stable Rust` so a failure short-
      # circuits the toolchain install, cargo cache restore,
      # clippy, and `cargo test --workspace`. The step uses only
      # POSIX shell (`grep` / `sort` / `diff`) — preinstalled on
      # every GitHub Actions runner; no `apt-get install`. Per
      # specs/115-walker-audit-ci/contracts/ci-step.md.
      - name: Walker-audit allow-list check
        shell: bash
        run: |
          set -u
          ALLOWLIST="mikebom-cli/src/scan_fs/walk.audit-allowlist.txt"
          # Milestone 117 (#347): strip the absolute line-number column from
          # both the live grep output AND the committed allow-list before
          # diffing, so unrelated insertions above an allow-listed walker
          # don't trigger false-positive failures from pure position drift.
          # Applied symmetrically so a hand-edited OLD-shape line in the
          # allow-list (with the `:NNN:` middle column) still compares
          # correctly against the new line-stripped live output (forgiveness
          # toward drift; the committed file SHOULD always be in NEW shape
          # per milestone 117 FR-002). BRE regex works identically on
          # GNU sed (Linux) and BSD sed (macOS).
          STRIP_LINE_NUMBERS='s/^\([^:]*\):[0-9]*:/\1:/'
          FAIL_HEADLINE="[FAIL] Walker-audit allow-list mismatch — see mikebom-cli/src/scan_fs/walk.rs's module-level comment for the exception policy."
          FAIL_POINTER_NEW="If your PR intentionally adds a new walker exception, see CONTRIBUTING.md § Walker-audit CI gate."
          FAIL_POINTER_BAD="If your PR did NOT intend to add a walker, remove the new fn walk_* function and use scan_fs::walk::safe_walk instead."

          # Precheck: missing or empty allow-list → fail closed per
          # FR-010 strict-enforcement bootstrap. A future PR that
          # accidentally or maliciously deletes the file gets the
          # same red CI as an unauthorized walker addition.
          if [ ! -f "$ALLOWLIST" ]; then
            echo "$FAIL_HEADLINE" >&2
            echo "" >&2
            echo "ERROR: $ALLOWLIST is missing." >&2
            echo "" >&2
            echo "This file is the bootstrap baseline for the walker-audit CI gate (feature 115)." >&2
            echo "If you intentionally removed it, restore from the previous commit:" >&2
            echo "    git show HEAD~1:$ALLOWLIST > $ALLOWLIST" >&2
            echo "" >&2
            echo "See CONTRIBUTING.md § Walker-audit CI gate for the file's purpose." >&2
            exit 1
          fi
          EXPECTED=$(grep -v '^#' "$ALLOWLIST" | grep -v '^$' | sed "$STRIP_LINE_NUMBERS" | LC_ALL=C sort -u)
          if [ -z "$EXPECTED" ]; then
            echo "$FAIL_HEADLINE" >&2
            echo "" >&2
            echo "ERROR: $ALLOWLIST is empty (zero non-blank, non-comment lines)." >&2
            echo "" >&2
            echo "This file is the bootstrap baseline for the walker-audit CI gate (feature 115)." >&2
            echo "Empty is not a valid state per FR-010 strict-enforcement bootstrap." >&2
            echo "" >&2
            echo "See CONTRIBUTING.md § Walker-audit CI gate for the file's purpose." >&2
            exit 1
          fi

          # Live audit pattern. LC_ALL=C pins lex order across runners.
          # `--include='*.rs'` scopes to Rust source so the audit doesn't
          # match its own allow-list file (`walk.audit-allowlist.txt`
          # lives under scan_fs/ for adjacency per SC-005, and every
          # entry inside it contains the substring `fn walk_`).
          #
          # Issue #378: a function whose name starts with `walk_` but
          # does NOT walk the filesystem (in-memory iterators, test
          # functions, etc.) MAY opt out of the audit by placing a
          # `// walker-audit:` sigil comment on the line immediately
          # above the function signature. The sigil's text after the
          # colon is free-form developer audit-trail. The pre-filter
          # below drops any match whose immediate predecessor line
          # carries the sigil; surviving matches still go through the
          # allow-list diff. Single sigil prefix per FR (issue body
          # acceptance criteria); the prefix matches whole-token
          # so `// walker-audit-elsewhere:` does NOT opt out.
          LIVE=$(LC_ALL=C grep -rEn --include='*.rs' 'fn walk[_(]' mikebom-cli/src/scan_fs/ | while IFS=: read -r path line content; do
            prev=$((line - 1))
            if [ "$prev" -ge 1 ]; then
              prev_line=$(LC_ALL=C sed -n "${prev}p" "$path" 2>/dev/null)
              case "$prev_line" in
                *"// walker-audit:"*) continue;;
              esac
            fi
            printf '%s:%s:%s\n' "$path" "$line" "$content"
          done | sed "$STRIP_LINE_NUMBERS" | LC_ALL=C sort -u)

          START_NS=$(date +%s%N 2>/dev/null || echo 0)
          if DIFF_OUT=$(diff -u <(printf '%s\n' "$EXPECTED") <(printf '%s\n' "$LIVE")); then
            END_NS=$(date +%s%N 2>/dev/null || echo 0)
            ELAPSED_MS=$(( (END_NS - START_NS) / 1000000 ))
            ENTRY_COUNT=$(printf '%s\n' "$EXPECTED" | wc -l | tr -d ' ')
            echo "Walker-audit allow-list check: OK (${ENTRY_COUNT} entries; ${ELAPSED_MS} ms)"
          else
            echo "$FAIL_HEADLINE" >&2
            echo "" >&2
            echo "--- mikebom-cli/src/scan_fs/walk.audit-allowlist.txt (expected)" >&2
            echo "+++ live: grep -rEn --include='*.rs' 'fn walk[_(]' mikebom-cli/src/scan_fs/ | sed -e 's/^\([^:]*\):[0-9]*:/\1:/' | sort -u (actual)" >&2
            printf '%s\n' "$DIFF_OUT" | tail -n +3 >&2
            echo "" >&2
            echo "$FAIL_POINTER_NEW" >&2
            echo "$FAIL_POINTER_BAD" >&2
            exit 1
          fi

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-25)
        with:
          components: clippy

      - name: Cache cargo + build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      # dtolnay/rust-toolchain leaves the bootstrap installer
      # (`rustup-init`) sitting at `~/.cargo/bin/rustup-init` alongside
      # the real `rustup`/`cargo`/`rustc` binaries. Cargo's `+stable`
      # toolchain-dispatch sometimes routes to `rustup-init` instead
      # of `rustup` (the resolution order is non-deterministic — same
      # directory, same prefix), producing:
      #
      #   error: unexpected argument '+stable' found
      #   Usage: rustup-init[EXE] [OPTIONS]
      #
      # …because `rustup-init` is an installer, not a dispatcher.
      # Removing it forces `cargo +<channel>` to dispatch to the real
      # `rustup`, which exists, is on PATH, and understands the
      # `+<channel>` syntax correctly. No-op if not present.
      #
      # CRITICAL: this step MUST run AFTER `Swatinem/rust-cache`.
      # That action caches `$CARGO_HOME/bin` and on cache-hit restores
      # `rustup-init` — undoing this cleanup if it runs before. Verified
      # via PR #217 macOS failure logs (2026-05-15).
      - name: Remove rustup-init + verify cargo works (`cargo +stable` dispatch race)
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init" "$HOME/.cargo/bin/rustup-init.exe"
          # Sanity-check that cargo itself dispatches as cargo — catches
          # the polluted-cache shape where ~/.cargo/bin/cargo IS the
          # rustup-init body under a different filename (observed on
          # the PR #217 macOS realistic-projects lane). The plain
          # `rm rustup-init` doesn't catch this; only a behavioral check
          # of the cargo binary does.
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: \`cargo --version\` fails — \$HOME/.cargo/bin/cargo is not a working cargo proxy."
            echo "--- ls -la \$HOME/.cargo/bin/ ---"
            ls -la "$HOME/.cargo/bin/" || true
            echo "--- file \$HOME/.cargo/bin/cargo ---"
            file "$HOME/.cargo/bin/cargo" || true
            echo "--- cargo --version output ---"
            cargo --version 2>&1 || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"
          if [ -e "$HOME/.cargo/bin/rustup-init" ] || [ -e "$HOME/.cargo/bin/rustup-init.exe" ]; then
            echo "ERROR: rustup-init still present after rm."
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "rustup-init absent from \$HOME/.cargo/bin (good)."

      # Milestone 090 — fixture-repo cache. mikebom-cli/build.rs
      # clones https://github.com/kusari-sandbox/mikebom-test-fixtures
      # at the SHA pinned by tests/fixtures.rev into
      # ~/.cache/mikebom/fixtures/<sha>/. Cache key = SHA, so a pin
      # bump cleanly invalidates. See specs/090-split-test-fixtures-repo/
      # contracts/fixture-path-helper.md for the full contract.
      - name: Cache fixture repo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/mikebom/fixtures
          key: mikebom-fixtures-${{ runner.os }}-${{ hashFiles('tests/fixtures.rev') }}

      # sbomqs is the cross-format SBOM-quality scorer that
      # enforces spec SC-001: mikebom's SPDX output must meet or
      # beat its CDX output on NTIA-minimum native features.
      # `tests/sbomqs_parity.rs` reads `$PATH` for the binary; it
      # exits with a visible skip if sbomqs isn't available, so
      # dropping this step doesn't break the build — it just
      # silently stops enforcing SC-001. Pinned to a specific
      # version so the sbomqs JSON output shape (feature keys in
      # particular) stays stable across CI runs.
      - name: Install sbomqs
        # v2.x requires the `/v2` suffix in the module path per Go's
        # post-v1 module versioning convention.
        #
        # GOMODCACHE redirected to a throwaway path so `go install`
        # doesn't populate $HOME/go/pkg/mod with sbomqs's transitive
        # deps. Without this, tests that discover a Go module cache
        # at $HOME/go/pkg/mod (e.g. scan_go_source_tree_emits_
        # transitive_edges_when_cache_present) stop hitting their
        # empty-cache skip path and start observing whichever deps
        # sbomqs happened to pull in — brittle across sbomqs
        # version bumps. Binary lands at $GOBIN (= $HOME/go/bin
        # by default) regardless of GOMODCACHE.
        #
        # No post-install cleanup: Go's module cache writes files
        # read-only (0444), so `rm -rf` refuses. $RUNNER_TEMP is
        # ephemeral per-job anyway, so just leaving the cache
        # there costs nothing — and the isolation goal (keep
        # $HOME/go/pkg/mod pristine) is met.
        run: |
          GOMODCACHE="${RUNNER_TEMP}/go-mod-cache-sbomqs" \
            go install github.com/interlynk-io/sbomqs/v2@v2.0.6
      - name: Add Go bin to PATH
        run: echo "${HOME}/go/bin" >> "$GITHUB_PATH"

      # Milestone 078 — install the JPEWdev `spdx3-validate` Python
      # tool used by the new `spdx3_conformance` integration test.
      # Pinned at 0.0.5 per research §2; bumping is a deliberate PR
      # with proof the new version doesn't surface false positives
      # (FR-008). Linux is the authoritative gate; macOS lane
      # intentionally skips this step (Python-toolchain variability is
      # a known noise vector — see plan.md project-structure decision).
      - name: Install spdx3-validate
        run: bash scripts/install-spdx3-validate.sh
      - name: Set MIKEBOM_REQUIRE_SPDX3_VALIDATOR
        run: echo "MIKEBOM_REQUIRE_SPDX3_VALIDATOR=1" >> "$GITHUB_ENV"

      # Milestone 083 — install trivy + syft pinned at the audit's
      # comparison-baseline versions (research §1). These power the
      # `transitive_parity_*` integration tests that compare mikebom's
      # per-ecosystem edge emission against trivy + syft as oracle
      # tools. Linux is the authoritative gate; macOS lane skips
      # (matches the SPDX 3 conformance pattern + the dpkg/rpm/apk
      # OS-package fixtures are Linux-only per FR-009).
      - name: Install trivy
        # Pinned at 0.69.3 per spec/083 research §1 — the audit
        # comparison-baseline version. The apt repo at
        # `aquasecurity.github.io/trivy-repo` carries only `latest`
        # (no version-pinned packages), so `apt-get install
        # trivy=0.69.3` fails with "Version '0.69.3' for 'trivy'
        # was not found". Install the version-pinned .deb directly
        # from GitHub Releases instead — also more reproducible
        # (the release artifact bytes are immutable; the apt repo
        # would silently roll forward across releases).
        run: |
          set -euo pipefail
          TRIVY_VERSION=0.69.3
          ARCH=$(dpkg --print-architecture)
          case "$ARCH" in
            amd64) DEB_ARCH="64bit" ;;
            arm64) DEB_ARCH="ARM64" ;;
            *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          curl -fsSL \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-${DEB_ARCH}.deb" \
            -o /tmp/trivy.deb
          sudo dpkg -i /tmp/trivy.deb
          trivy --version
      - name: Install syft
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.27.0
          syft version
      - name: Set MIKEBOM_REQUIRE_TRANSITIVE_PARITY
        run: echo "MIKEBOM_REQUIRE_TRANSITIVE_PARITY=1" >> "$GITHUB_ENV"

      # Pin `+stable` explicitly on clippy/test so these never fall through
      # to nightly even if something earlier changes the default.
      #
      # `-D warnings` is on as of milestone 016 (PR #34): the legacy
      # backlog of dead-code + doc-list warnings was cleared, leaving
      # a zero-warnings baseline. New lint categories from future
      # toolchain bumps fail CI loudly; the resolution is to fix the
      # new category in the same PR (often `cargo clippy --fix` does
      # most of the work), or add `#[allow(...)]` with a concrete
      # planned-consumer reference per spec FR-003.
      - name: Clippy
        run: cargo +stable clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo +stable test --workspace

      # Milestone 089 — production-deps vuln gate. Re-uses the trivy
      # 0.69.3 install above. Excludes test fixtures (intentionally
      # vulnerable) via path-skip. Fails the lane on any HIGH-severity
      # advisory under target `Cargo.lock` not listed in milestone 089's
      # known-acceptances.md. See specs/089-bump-sigstore-vulns/.
      - name: Production-deps vuln gate
        run: |
          trivy --quiet fs \
            --scanners vuln \
            --skip-dirs tests/fixtures \
            --skip-dirs mikebom-cli/tests/fixtures \
            --skip-dirs target \
            --severity HIGH \
            --format json \
            --output /tmp/prod-vulns.json \
            .
          # Extract accepted advisory IDs from milestone-089 known-acceptances.md.
          # Empty file (no residual vulns) is OK.
          ACC_FILE="specs/089-bump-sigstore-vulns/known-acceptances.md"
          if [ -f "$ACC_FILE" ]; then
            grep -oE 'GHSA-[a-z0-9-]+|CVE-[0-9]+-[0-9]+' "$ACC_FILE" | sort -u > /tmp/accepted-ids.txt
          else
            : > /tmp/accepted-ids.txt
          fi
          # Find HIGH advisories under Cargo.lock NOT on the acceptance list.
          UNACCEPTED=$(jq -r '
            [.Results[]?
             | select(.Target == "Cargo.lock")
             | .Vulnerabilities[]?
             | select(.Severity == "HIGH")
             | .VulnerabilityID
            ] | unique | .[]
          ' /tmp/prod-vulns.json | grep -vxF -f /tmp/accepted-ids.txt || true)
          if [ -n "$UNACCEPTED" ]; then
            echo "::error::Unaccepted HIGH advisories in production deps:"
            echo "$UNACCEPTED"
            echo "::error::Either fix the vulnerable dep, or add a justified entry to $ACC_FILE."
            exit 1
          fi
          echo "✓ no unaccepted HIGH production-deps vulns"

  lint-and-test-macos:
    name: Lint + test (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # see lint-and-test job for rationale

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-25)
        with:
          components: clippy

      - name: Cache cargo + build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      # See lint-and-test job for the rationale. MUST run AFTER
      # Swatinem/rust-cache or its $CARGO_HOME/bin restore re-creates
      # rustup-init.
      - name: Remove rustup-init + verify cargo works (`cargo +stable` dispatch race)
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init" "$HOME/.cargo/bin/rustup-init.exe"
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: \`cargo --version\` fails — \$HOME/.cargo/bin/cargo is not a working cargo proxy."
            echo "--- ls -la \$HOME/.cargo/bin/ ---"
            ls -la "$HOME/.cargo/bin/" || true
            echo "--- file \$HOME/.cargo/bin/cargo ---"
            file "$HOME/.cargo/bin/cargo" || true
            echo "--- cargo --version output ---"
            cargo --version 2>&1 || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"
          if [ -e "$HOME/.cargo/bin/rustup-init" ] || [ -e "$HOME/.cargo/bin/rustup-init.exe" ]; then
            echo "ERROR: rustup-init still present after rm."
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "rustup-init absent from \$HOME/.cargo/bin (good)."

      # Milestone 090 — fixture-repo cache (see Linux lane above).
      - name: Cache fixture repo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/mikebom/fixtures
          key: mikebom-fixtures-${{ runner.os }}-${{ hashFiles('tests/fixtures.rev') }}

      # No eBPF / nightly / bpf-linker / sbomqs steps here — those are
      # all Linux-only. Cargo's target-metadata exclusion skips
      # `mikebom-ebpf` automatically on non-Linux, and `sbomqs_parity`
      # tests skip cleanly when sbomqs isn't on $PATH. The macOS job
      # exists to enforce the maintainer's local-dev experience: zero
      # warnings on Apple Silicon, all user-space tests pass.
      - name: Clippy
        run: cargo +stable clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo +stable test --workspace

  # Milestone 100 — Windows-host build + test lane. Validates that the
  # user-space readers (cargo / npm / pip / gem / maven / golang) +
  # binary scanner compile and run cleanly on Windows. Linux-only
  # readers (dpkg/rpm/apk), Docker daemon scanning, OCI pull, and
  # eBPF are all `#[cfg(unix)]`-gated or feature-gated; cargo's
  # target-metadata exclusion drops `mikebom-ebpf` on non-Linux.
  # See specs/100-windows-host-build/.
  lint-and-test-windows:
    name: Lint + test (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # see lint-and-test job for rationale

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-25)
        with:
          components: clippy

      - name: Cache cargo + build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      # See lint-and-test job for the rationale. This supersedes the
      # milestone-101 Windows-only `rustup default stable` workaround
      # — that one papered over the symptom on one lane; this one
      # fixes the root cause (rustup-init left on PATH alongside
      # rustup) on every lane. MUST run AFTER Swatinem/rust-cache or
      # its $CARGO_HOME/bin restore re-creates rustup-init.
      - name: Remove rustup-init + verify cargo works (`cargo +stable` dispatch race)
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init" "$HOME/.cargo/bin/rustup-init.exe"
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: \`cargo --version\` fails — \$HOME/.cargo/bin/cargo is not a working cargo proxy."
            echo "--- ls -la \$HOME/.cargo/bin/ ---"
            ls -la "$HOME/.cargo/bin/" || true
            echo "--- file \$HOME/.cargo/bin/cargo ---"
            file "$HOME/.cargo/bin/cargo" || true
            echo "--- cargo --version output ---"
            cargo --version 2>&1 || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"
          if [ -e "$HOME/.cargo/bin/rustup-init" ] || [ -e "$HOME/.cargo/bin/rustup-init.exe" ]; then
            echo "ERROR: rustup-init still present after rm."
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "rustup-init absent from \$HOME/.cargo/bin (good)."

      # Milestone 090 — fixture-repo cache. Windows uses the same
      # ~/.cache/mikebom/fixtures path; the build.rs shells out to
      # `git` which is preinstalled on `windows-latest` runners.
      - name: Cache fixture repo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/mikebom/fixtures
          key: mikebom-fixtures-${{ runner.os }}-${{ hashFiles('tests/fixtures.rev') }}

      - name: Clippy
        run: cargo +stable clippy --workspace --all-targets -- -D warnings

      # Milestone 101 — Windows smoke test (blocking gate). Runs the
      # `scan_windows_smoke.rs` integration test which invokes
      # `mikebom.exe sbom scan` against the cargo + polyglot fixtures
      # and asserts CDX 1.6 envelope conformance, per-ecosystem PURL
      # coverage, forward-slash normalization, and a 60-second
      # per-scan timeout. Runs BEFORE the broader workspace test
      # step so it benefits from cargo-cache warmth from the clippy
      # step. NO `continue-on-error:` — failures block the merge.
      # See specs/101-windows-smoke-experimental/.
      - name: Smoke test (blocking — milestone 101)
        run: cargo +stable test --test scan_windows_smoke

      # Milestone 100 ships build correctness (clippy `-D warnings`
      # above) + SBOM emission with forward-slash paths + a Windows
      # release artifact. The milestone-101 smoke step (above) gates
      # the headline runtime-regression class. Full `cargo test
      # --workspace` parity on Windows is tracked in follow-up issue
      # #210: the Linux-first test suite has hundreds of tests baking
      # POSIX assumptions (HOME env var, /var/lib/dpkg paths,
      # forward-slash substring matchers in production code, OCI
      # cache atomic-rename) that need either #[cfg(unix)] gates or
      # Windows-portable rewrites. This step's per-test backlog
      # surfaces in CI logs without blocking the MVP. When #210
      # closes, drop the `continue-on-error` line.
      - name: Tests (non-blocking, see issue #210)
        continue-on-error: true
        run: cargo +stable test --workspace

  # Opt-in eBPF lane. Pays the nightly + bpf-linker + xtask ebpf cost
  # so the user-space eBPF integration (mikebom-cli/src/trace/* +
  # `mikebom trace` subcommand) keeps working. Default lanes above
  # do not invoke this path — see specs/020-ebpf-feature-gate/.
  lint-and-test-ebpf:
    name: Lint + test (linux-x86_64, --features ebpf-tracing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # see lint-and-test job for rationale

      - name: Install eBPF build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev pkg-config libssl-dev

      # Install nightly first so stable ends up as the default toolchain
      # for unpinned `cargo` invocations. dtolnay/rust-toolchain sets the
      # default to whichever it installed last.
      - name: Install nightly Rust with rust-src
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly (2026-04-25)
        with:
          components: rust-src

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-25)
        with:
          components: clippy

      - name: Make stable the default toolchain
        run: rustup default stable

      - name: Cache cargo + build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      # See lint-and-test job for the rationale. The eBPF lane
      # installs nightly + stable in sequence; rm runs once after
      # both installs and after Swatinem/rust-cache restores so any
      # `rustup-init` left by either invocation OR by a cache-hit
      # `$CARGO_HOME/bin` restore is cleaned up before the first
      # `cargo +stable` call.
      - name: Remove rustup-init + verify cargo works (`cargo +stable` dispatch race)
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init" "$HOME/.cargo/bin/rustup-init.exe"
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: \`cargo --version\` fails — \$HOME/.cargo/bin/cargo is not a working cargo proxy."
            echo "--- ls -la \$HOME/.cargo/bin/ ---"
            ls -la "$HOME/.cargo/bin/" || true
            echo "--- file \$HOME/.cargo/bin/cargo ---"
            file "$HOME/.cargo/bin/cargo" || true
            echo "--- cargo --version output ---"
            cargo --version 2>&1 || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"
          if [ -e "$HOME/.cargo/bin/rustup-init" ] || [ -e "$HOME/.cargo/bin/rustup-init.exe" ]; then
            echo "ERROR: rustup-init still present after rm."
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "rustup-init absent from \$HOME/.cargo/bin (good)."

      # Milestone 090 — fixture-repo cache (see Linux lane above).
      - name: Cache fixture repo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/mikebom/fixtures
          key: mikebom-fixtures-${{ runner.os }}-${{ hashFiles('tests/fixtures.rev') }}

      - name: Install bpf-linker
        run: |
          if ! command -v bpf-linker >/dev/null 2>&1; then
            cargo +nightly install bpf-linker --locked
          fi

      - name: Build eBPF object
        run: cargo run --package xtask -- ebpf

      - name: Install sbomqs
        run: |
          GOMODCACHE="${RUNNER_TEMP}/go-mod-cache-sbomqs" \
            go install github.com/interlynk-io/sbomqs/v2@v2.0.6
      - name: Add Go bin to PATH
        run: echo "${HOME}/go/bin" >> "$GITHUB_PATH"

      # Milestone 078 — same install + env-var as the regular Linux
      # lane so the conformance gate runs identically on both Linux
      # matrix entries.
      - name: Install spdx3-validate
        run: bash scripts/install-spdx3-validate.sh
      - name: Set MIKEBOM_REQUIRE_SPDX3_VALIDATOR
        run: echo "MIKEBOM_REQUIRE_SPDX3_VALIDATOR=1" >> "$GITHUB_ENV"

      - name: Clippy (--features ebpf-tracing)
        run: cargo +stable clippy --workspace --all-targets --features ebpf-tracing -- -D warnings

      - name: Tests (--features ebpf-tracing)
        run: cargo +stable test --workspace --features ebpf-tracing
