name: Release

on:
  push:
    tags:
      - 'v*-alpha.*'
      - 'v*-beta.*'
      - 'v*-rc.*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build the target-independent bpfel-unknown-none bytecode once and share
  # it with both Linux userspace-build jobs via artifact upload.
  build-ebpf:
    name: Build eBPF object
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install eBPF build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libelf-dev pkg-config

      - name: Install nightly Rust with rust-src
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly (2026-04-25)
        with:
          components: rust-src

      - name: Cache cargo + nightly build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ebpf-nightly
          workspaces: |
            .
            mikebom-ebpf

      # See ci.yml::lint-and-test for the rationale — dtolnay/rust-
      # toolchain leaves `rustup-init` on PATH alongside the real
      # `rustup`/`cargo`, and cargo's `+<channel>` dispatch can route
      # to `rustup-init` non-deterministically, producing the
      # `unexpected argument '+stable' found` flake on any runner.
      # MUST run AFTER Swatinem/rust-cache or its $CARGO_HOME/bin
      # restore re-creates rustup-init.
      - name: Remove rustup-init (prevents `cargo +<channel>` dispatch race)
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init" "$HOME/.cargo/bin/rustup-init.exe"
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: \`cargo --version\` fails — \$HOME/.cargo/bin/cargo is not a working cargo proxy."
            echo "--- ls -la \$HOME/.cargo/bin/ ---"
            ls -la "$HOME/.cargo/bin/" || true
            echo "--- file \$HOME/.cargo/bin/cargo ---"
            file "$HOME/.cargo/bin/cargo" || true
            echo "--- cargo --version output ---"
            cargo --version 2>&1 || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"
          if [ -e "$HOME/.cargo/bin/rustup-init" ] || [ -e "$HOME/.cargo/bin/rustup-init.exe" ]; then
            echo "ERROR: rustup-init still present after rm."
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "rustup-init absent from \$HOME/.cargo/bin (good)."

      - name: Install bpf-linker
        run: cargo +nightly install bpf-linker --locked

      - name: Build eBPF object
        run: cargo run --package xtask -- ebpf

      - name: Upload eBPF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mikebom-ebpf-object
          path: mikebom-ebpf/target/bpfel-unknown-none/release/mikebom-ebpf
          if-no-files-found: error
          retention-days: 7

  build-linux-x86_64:
    name: Build — linux-x86_64
    needs: build-ebpf
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust (x86_64 target)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-25)
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo + cross-compiled build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ${{ env.TARGET }}

      # See ci.yml::lint-and-test for the rationale. MUST run AFTER
      # Swatinem/rust-cache or its $CARGO_HOME/bin restore re-creates
      # rustup-init.
      - name: Remove rustup-init (prevents `cargo +stable` dispatch race)
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init" "$HOME/.cargo/bin/rustup-init.exe"
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: \`cargo --version\` fails — \$HOME/.cargo/bin/cargo is not a working cargo proxy."
            echo "--- ls -la \$HOME/.cargo/bin/ ---"
            ls -la "$HOME/.cargo/bin/" || true
            echo "--- file \$HOME/.cargo/bin/cargo ---"
            file "$HOME/.cargo/bin/cargo" || true
            echo "--- cargo --version output ---"
            cargo --version 2>&1 || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"
          if [ -e "$HOME/.cargo/bin/rustup-init" ] || [ -e "$HOME/.cargo/bin/rustup-init.exe" ]; then
            echo "ERROR: rustup-init still present after rm."
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "rustup-init absent from \$HOME/.cargo/bin (good)."

      # Use `cross` on both Linux targets so binaries pin a wide-compat
      # glibc baseline (~2.17/2.18) instead of whatever the
      # ubuntu-latest runner ships (currently 2.39, which breaks Debian
      # 11/12, Ubuntu 22.04, RHEL 8/9 at load time). Matches the
      # aarch64 job below.
      - name: Install cross
        run: cargo install cross --locked

      - name: Download eBPF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mikebom-ebpf-object
          path: ebpf-download

      - name: Place eBPF at loader's expected path
        run: |
          mkdir -p mikebom-ebpf/target/bpfel-unknown-none/release
          cp ebpf-download/mikebom-ebpf mikebom-ebpf/target/bpfel-unknown-none/release/mikebom-ebpf

      - name: Build userspace binary (cross)
        run: cross build --release --target "$TARGET" --package mikebom

      - name: Package tarball
        run: |
          set -euo pipefail
          stage="mikebom-${{ github.ref_name }}-${TARGET}"
          # Lay out the tarball so the loader finds the eBPF object
          # relative to CWD at the path it already expects:
          # mikebom-ebpf/target/bpfel-unknown-none/release/mikebom-ebpf.
          # This avoids any runtime mkdir/symlink shuffle in the wrapper
          # and eliminates the filename collision the previous design
          # had (mikebom-ebpf as a sibling file vs. as a directory).
          mkdir -p "$stage/mikebom-ebpf/target/bpfel-unknown-none/release"
          cp "target/${TARGET}/release/mikebom" "$stage/mikebom"
          cp ebpf-download/mikebom-ebpf "$stage/mikebom-ebpf/target/bpfel-unknown-none/release/mikebom-ebpf"
          cp README.md "$stage/README.md"
          if [[ -f LICENSE ]]; then cp LICENSE "$stage/LICENSE"; fi
          cat > "$stage/mikebom.sh" <<'WRAPPER'
          #!/usr/bin/env bash
          # mikebom wrapper for trace mode. The loader resolves the eBPF
          # object relative to CWD at
          # mikebom-ebpf/target/bpfel-unknown-none/release/mikebom-ebpf,
          # which this tarball ships in that exact layout. The wrapper
          # just cd's into the install dir so the relative path works
          # regardless of where the user invokes it from.
          #
          # For `sbom scan`, `sbom generate`, and other non-trace
          # subcommands the loader is never invoked — `./mikebom` can
          # be run directly without this wrapper.
          set -euo pipefail
          here="$(cd -- "$(dirname -- "${BASH_SOURCE[0]}")" && pwd)"
          cd "$here"
          exec "$here/mikebom" "$@"
          WRAPPER
          chmod +x "$stage/mikebom.sh"
          tar -czf "${stage}.tar.gz" "$stage"
          ls -la "${stage}.tar.gz"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mikebom-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          path: mikebom-${{ github.ref_name }}-${{ env.TARGET }}.tar.gz
          if-no-files-found: error

  build-linux-aarch64:
    name: Build — linux-aarch64
    needs: build-ebpf
    runs-on: ubuntu-latest
    env:
      TARGET: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust (aarch64 target)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-25)
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache cargo + cross-compiled build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ${{ env.TARGET }}

      # See ci.yml::lint-and-test for the rationale. MUST run AFTER
      # Swatinem/rust-cache or its $CARGO_HOME/bin restore re-creates
      # rustup-init.
      - name: Remove rustup-init (prevents `cargo +stable` dispatch race)
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init" "$HOME/.cargo/bin/rustup-init.exe"
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: \`cargo --version\` fails — \$HOME/.cargo/bin/cargo is not a working cargo proxy."
            echo "--- ls -la \$HOME/.cargo/bin/ ---"
            ls -la "$HOME/.cargo/bin/" || true
            echo "--- file \$HOME/.cargo/bin/cargo ---"
            file "$HOME/.cargo/bin/cargo" || true
            echo "--- cargo --version output ---"
            cargo --version 2>&1 || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"
          if [ -e "$HOME/.cargo/bin/rustup-init" ] || [ -e "$HOME/.cargo/bin/rustup-init.exe" ]; then
            echo "ERROR: rustup-init still present after rm."
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "rustup-init absent from \$HOME/.cargo/bin (good)."

      - name: Install cross
        run: cargo install cross --locked

      - name: Download eBPF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mikebom-ebpf-object
          path: ebpf-download

      - name: Place eBPF at loader's expected path
        run: |
          mkdir -p mikebom-ebpf/target/bpfel-unknown-none/release
          cp ebpf-download/mikebom-ebpf mikebom-ebpf/target/bpfel-unknown-none/release/mikebom-ebpf

      - name: Build userspace binary (cross)
        run: cross build --release --target "$TARGET" --package mikebom

      - name: Package tarball
        run: |
          set -euo pipefail
          stage="mikebom-${{ github.ref_name }}-${TARGET}"
          mkdir -p "$stage/mikebom-ebpf/target/bpfel-unknown-none/release"
          cp "target/${TARGET}/release/mikebom" "$stage/mikebom"
          cp ebpf-download/mikebom-ebpf "$stage/mikebom-ebpf/target/bpfel-unknown-none/release/mikebom-ebpf"
          cp README.md "$stage/README.md"
          if [[ -f LICENSE ]]; then cp LICENSE "$stage/LICENSE"; fi
          cat > "$stage/mikebom.sh" <<'WRAPPER'
          #!/usr/bin/env bash
          # Trace-mode wrapper: cd into the install dir so the loader's
          # CWD-relative eBPF path (mikebom-ebpf/target/bpfel-unknown-none/release/mikebom-ebpf)
          # resolves. Non-trace subcommands can call ./mikebom directly.
          set -euo pipefail
          here="$(cd -- "$(dirname -- "${BASH_SOURCE[0]}")" && pwd)"
          cd "$here"
          exec "$here/mikebom" "$@"
          WRAPPER
          chmod +x "$stage/mikebom.sh"
          tar -czf "${stage}.tar.gz" "$stage"
          ls -la "${stage}.tar.gz"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mikebom-${{ github.ref_name }}-aarch64-unknown-linux-gnu
          path: mikebom-${{ github.ref_name }}-${{ env.TARGET }}.tar.gz
          if-no-files-found: error

  build-macos-aarch64:
    name: Build — macos-aarch64
    runs-on: macos-14
    env:
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust (aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-25)
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo + build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ${{ env.TARGET }}

      # See ci.yml::lint-and-test for the rationale. MUST run AFTER
      # Swatinem/rust-cache or its $CARGO_HOME/bin restore re-creates
      # rustup-init.
      - name: Remove rustup-init (prevents `cargo +stable` dispatch race)
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init" "$HOME/.cargo/bin/rustup-init.exe"
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: \`cargo --version\` fails — \$HOME/.cargo/bin/cargo is not a working cargo proxy."
            echo "--- ls -la \$HOME/.cargo/bin/ ---"
            ls -la "$HOME/.cargo/bin/" || true
            echo "--- file \$HOME/.cargo/bin/cargo ---"
            file "$HOME/.cargo/bin/cargo" || true
            echo "--- cargo --version output ---"
            cargo --version 2>&1 || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"
          if [ -e "$HOME/.cargo/bin/rustup-init" ] || [ -e "$HOME/.cargo/bin/rustup-init.exe" ]; then
            echo "ERROR: rustup-init still present after rm."
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "rustup-init absent from \$HOME/.cargo/bin (good)."

      - name: Build userspace binary
        run: cargo build --release --target "$TARGET" --package mikebom

      - name: Package tarball
        run: |
          set -euo pipefail
          stage="mikebom-${{ github.ref_name }}-${TARGET}"
          mkdir -p "$stage"
          cp "target/${TARGET}/release/mikebom" "$stage/mikebom"
          cp README.md "$stage/README.md"
          if [[ -f LICENSE ]]; then cp LICENSE "$stage/LICENSE"; fi
          tar -czf "${stage}.tar.gz" "$stage"
          ls -la "${stage}.tar.gz"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mikebom-${{ github.ref_name }}-aarch64-apple-darwin
          path: mikebom-${{ github.ref_name }}-${{ env.TARGET }}.tar.gz
          if-no-files-found: error

  # Milestone 100 — Windows x86_64 release artifact. Produces a .zip
  # containing mikebom.exe + README + (if present) LICENSE, matching
  # the layout of the Linux/macOS tarballs. mikebom-ebpf is excluded
  # automatically via cargo's target-metadata exclusion.
  build-windows-x86_64:
    name: Build — windows-x86_64
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (2026-04-25)
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ${{ env.TARGET }}

      # See ci.yml::lint-and-test for the rationale. MUST run AFTER
      # Swatinem/rust-cache or its $CARGO_HOME/bin restore re-creates
      # rustup-init.
      - name: Remove rustup-init (prevents `cargo +stable` dispatch race)
        shell: bash
        run: |
          rm -f "$HOME/.cargo/bin/rustup-init" "$HOME/.cargo/bin/rustup-init.exe"
          if ! cargo --version > /dev/null 2>&1; then
            echo "ERROR: \`cargo --version\` fails — \$HOME/.cargo/bin/cargo is not a working cargo proxy."
            echo "--- ls -la \$HOME/.cargo/bin/ ---"
            ls -la "$HOME/.cargo/bin/" || true
            echo "--- file \$HOME/.cargo/bin/cargo ---"
            file "$HOME/.cargo/bin/cargo" || true
            echo "--- cargo --version output ---"
            cargo --version 2>&1 || true
            exit 1
          fi
          echo "cargo --version OK: $(cargo --version)"
          if [ -e "$HOME/.cargo/bin/rustup-init" ] || [ -e "$HOME/.cargo/bin/rustup-init.exe" ]; then
            echo "ERROR: rustup-init still present after rm."
            ls -la "$HOME/.cargo/bin/" || true
            exit 1
          fi
          echo "rustup-init absent from \$HOME/.cargo/bin (good)."

      - name: Build userspace binary
        run: cargo build --release --target $env:TARGET --package mikebom
        shell: pwsh

      - name: Package zip
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $stage = "mikebom-$env:REF_NAME-$env:TARGET"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/$env:TARGET/release/mikebom.exe" "$stage/mikebom.exe"
          Copy-Item README.md "$stage/README.md"
          if (Test-Path LICENSE) { Copy-Item LICENSE "$stage/LICENSE" }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          Get-Item "$stage.zip"

      - name: Upload zip artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mikebom-${{ github.ref_name }}-x86_64-pc-windows-msvc
          path: mikebom-${{ github.ref_name }}-${{ env.TARGET }}.zip
          if-no-files-found: error

  # Issue #234 — multi-arch production container image. Reuses the
  # per-arch tarballs uploaded by build-linux-x86_64 and
  # build-linux-aarch64 so the binary inside the image is byte-
  # identical to the binary in the GitHub-Releases download. The
  # image is signed with cosign keyless via Sigstore (matches the
  # project's existing attestation philosophy).
  publish-container-image:
    name: Publish multi-arch container image
    needs: [build-linux-x86_64, build-linux-aarch64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for cosign keyless OIDC token exchange.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Kusari Inspector requirement: prevent token-in-.git/config
          # exposure to subsequent steps / artifacts. This workflow
          # doesn't push back to the repo, so persisting creds is
          # never needed.
          persist-credentials: false

      - name: Download linux-x86_64 tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mikebom-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          path: ./image-context/amd64

      - name: Download linux-aarch64 tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mikebom-${{ github.ref_name }}-aarch64-unknown-linux-gnu
          path: ./image-context/arm64

      - name: Extract tarballs into per-arch staging dirs
        shell: bash
        run: |
          set -euo pipefail
          # The Dockerfile expects ./image-context/{amd64,arm64}/staging/
          # to contain the unpacked tarball's top-level directory contents.
          # The tarball top-level dir name embeds version + target, so we
          # extract then rename to the stable `staging` symlink.
          for arch in amd64 arm64; do
            cd "./image-context/${arch}"
            tarball=$(ls mikebom-*.tar.gz)
            tar -xzf "$tarball"
            # The tarball contains one directory named mikebom-<tag>-<target>;
            # rename it to `staging` for the Dockerfile COPY. The glob
            # `mikebom-*/` (trailing slash) restricts the match to the
            # extracted directory only, excluding the tarball file itself —
            # without the trailing slash, `mv` sees both as sources and
            # errors because the `staging` destination doesn't exist yet.
            mv mikebom-*/ staging
            ls -la staging/
            cd ../..
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        # Kusari Inspector requirement: NEVER interpolate ${{ ... }}
        # context expressions directly into `run:` shell blocks —
        # bind them to env: variables first to neutralize shell-
        # injection via attacker-controllable refs/branch names.
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          ref="$REF_NAME"
          # Strip leading 'v' for the version-only tag — both forms are
          # common in the ecosystem, ship both.
          ver="${ref#v}"
          {
            echo "tags<<EOF"
            echo "ghcr.io/${REPO_OWNER}/mikebom:${ref}"
            echo "ghcr.io/${REPO_OWNER}/mikebom:${ver}"
            echo "ghcr.io/${REPO_OWNER}/mikebom:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push multi-arch image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./image-context
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: mode=max
          sbom: true
          # No build args needed; buildx auto-passes TARGETARCH.

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (Sigstore keyless OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          cosign sign --yes "ghcr.io/${OWNER}/mikebom@${DIGEST}"
          echo "Signed image: ghcr.io/${OWNER}/mikebom@${DIGEST}"

  release:
    name: Create GitHub pre-release
    needs: [build-linux-x86_64, build-linux-aarch64, build-macos-aarch64, build-windows-x86_64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all tarball artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mikebom-${{ github.ref_name }}-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          sha256sum mikebom-*.tar.gz mikebom-*.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            mikebom-*.tar.gz
            mikebom-*.zip
            SHA256SUMS
